name: Update bioinformatics GitHub Pages

on:
  schedule:
    - cron: "20 9 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Discover new seed projects
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCOVERY_MIN_STARS: "10"
          DISCOVERY_LIMIT: "5"
        run: |
          bun ./bioinformatics-youbetterknow.ts --discover-only --catalog data/catalog.json

      - name: Generate catalog markdown and Pages data
        env:
          TZ: Asia/Shanghai
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bun ./bioinformatics-youbetterknow.ts \
            --catalog data/catalog.json \
            --output site/awesome-bioinformatics.md \
            --json-output site/data/latest.json \
            --history-output site/data/history.json \
            --snapshot-dir site/data/snapshots

      - name: Commit refreshed catalog and generated data
        env:
          TZ: Asia/Shanghai
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain --untracked-files=normal)" ]; then
            echo "No repository changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog.json site/data/latest.json site/data/history.json site/data/snapshots site/awesome-bioinformatics.md
          git commit -m "Update bioinformatics dashboard for $(date +%F)"
          git push

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
